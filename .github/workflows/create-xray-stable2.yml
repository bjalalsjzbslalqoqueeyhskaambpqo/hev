name: Create Xray-Stable2 branch

on:
  push:
    branches: [ work ]
  workflow_dispatch:
    inputs:
      source_repository:
        description: "Repository to copy from (owner/repo)"
        required: true
        default: "bjalalsjzbslalqoqueeyhskaambpqo/hev"
      source_ref:
        description: "Commit SHA, tag, or branch to copy"
        required: true
        default: "d03a66c1d200618e84b9da1390adcbbc2d5706c5"
      target_branch:
        description: "Destination branch in this repository"
        required: true
        default: "Xray-Stable2"

permissions:
  contents: write

env:
  SOURCE_REPOSITORY: ${{ github.event.inputs.source_repository || 'bjalalsjzbslalqoqueeyhskaambpqo/hev' }}
  SOURCE_REF: ${{ github.event.inputs.source_ref || 'd03a66c1d200618e84b9da1390adcbbc2d5706c5' }}
  TARGET_BRANCH: ${{ github.event.inputs.target_branch || 'Xray-Stable2' }}

jobs:
  recreate-branch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: target

      - name: Checkout source repository and ref
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ env.SOURCE_REF }}
          fetch-depth: 1
          path: source

      - name: Recreate destination branch with source content
        working-directory: target
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout --orphan "${TARGET_BRANCH}"
          git reset --hard
          git clean -fdx

          rsync -a --delete --exclude='.git' ../source/ ./

          git add -A
          git commit -m "Create ${TARGET_BRANCH} from ${SOURCE_REPOSITORY}@${SOURCE_REF}"
          git push origin "${TARGET_BRANCH}" --force
