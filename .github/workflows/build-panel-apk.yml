name: Build Panel APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'PANEL_CONFIG.txt'
      - 'SELLER_CODE.txt'
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build-panel-apk.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.7

      - name: Prepare release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "No hay keystore en secrets: generando uno aleatorio."
            STORE_PASS="$(openssl rand -hex 20)"
            keytool -genkeypair \
              -keystore "$RUNNER_TEMP/release.keystore" \
              -storepass "$STORE_PASS" \
              -alias btrelease \
              -keypass "$STORE_PASS" \
              -dname "CN=BlackTunnel, OU=Mobile, O=BlackTunnel, L=NA, ST=NA, C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
            echo "SIGNING_STORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "SIGNING_STORE_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_ALIAS=btrelease" >> "$GITHUB_ENV"
            echo "SIGNING_KEY_PASSWORD=$STORE_PASS" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "SIGNING_STORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          echo "SIGNING_STORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> "$GITHUB_ENV"
          echo "SIGNING_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}" >> "$GITHUB_ENV"

      - name: Build release APK (minified, arm64)
        run: |
          gradle --no-daemon :app:assembleRelease -x lint -x test

      - name: Report APK size
        run: |
          APK="$(ls -1 app/build/outputs/apk/release/*.apk | head -n1)"
          echo "APK: $APK"
          ls -lh "$APK"

      - name: Upload release APK
        uses: actions/upload-artifact@v5
        with:
          name: blacktunnel-panel-arm64-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload mapping (R8)
        uses: actions/upload-artifact@v5
        with:
          name: r8-mapping-panel
          path: app/build/outputs/mapping/release/mapping.txt
