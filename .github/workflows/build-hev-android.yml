name: Build hev-socks5-tunnel for Android

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get latest release tag
        id: latest
        run: |
          TAG=$(curl -s https://api.github.com/repos/heiher/hev-socks5-tunnel/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Checkout hev-socks5-tunnel
        run: |
          mkdir hev-socks5-tunnel
          cd hev-socks5-tunnel
          git clone --recursive --branch ${{ steps.latest.outputs.tag }} https://github.com/heiher/hev-socks5-tunnel jni

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d
          add-to-path: true

      - name: Build with ndk-build
        run: |
          cd hev-socks5-tunnel
          ${{ steps.setup-ndk.outputs.ndk-path }}/ndk-build \
            APP_ABI="arm64-v8a armeabi-v7a" \
            APP_PLATFORM=android-29 \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=jni/Android.mk \
            NDK_APPLICATION_MK=jni/Application.mk

      - name: Collect .so files
        run: |
          mkdir -p output/jniLibs/arm64-v8a
          mkdir -p output/jniLibs/armeabi-v7a
          cp hev-socks5-tunnel/libs/arm64-v8a/libhev-socks5-tunnel.so output/jniLibs/arm64-v8a/
          cp hev-socks5-tunnel/libs/armeabi-v7a/libhev-socks5-tunnel.so output/jniLibs/armeabi-v7a/

      - name: Push to libs branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone --depth=1 --branch libs \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            libs-branch 2>/dev/null || \
          git clone --depth=1 \
            https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git \
            libs-branch

          cd libs-branch

          if git show-ref --quiet refs/heads/libs; then
            git checkout libs
          elif git ls-remote --exit-code --heads origin libs; then
            git fetch origin libs
            git checkout libs
          else
            git checkout --orphan libs
            git rm -rf .
          fi

          cp -r ../output/jniLibs ./

          git add jniLibs/
          git commit -m "Update hev-socks5-tunnel libs ${{ steps.latest.outputs.tag }} [$(date +'%Y-%m-%d %H:%M:%S')]" || echo "Nothing to commit"
          git push origin libs
