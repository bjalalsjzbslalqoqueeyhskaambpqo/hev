name: Build Xray ARM64

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Xray-core
        uses: actions/checkout@v4
        with:
          repository: XTLS/Xray-core
          ref: main

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build ARM64
        env:
          CGO_ENABLED: 0
          GOOS: android
          GOARCH: arm64
        run: |
          go build \
            -o xray-arm64 \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -buildid=" \
            ./main

      - name: Publish to branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: release-arm64
          publish_dir: .
          include_files: xray-arm64
          force_orphan: true
