name: Build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download HEV
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L "https://github.com/bjalalsjzbslalqoqueeyhskaambpqo/hev/raw/libs/jniLibs/arm64-v8a/libhev-socks5-tunnel.so" \
            -o app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so

      - name: Download Xray
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L "https://github.com/bjalalsjzbslalqoqueeyhskaambpqo/hev/blob/release-arm64/libxray.so?raw=1" \
            -o app/src/main/jniLibs/arm64-v8a/libxray.so

      - name: Download Nexora branding assets (first run + self-heal)
        run: |
          mkdir -p app/src/main/assets/branding
          mkdir -p app/src/main/assets/branding_v2

          if [ ! -s app/src/main/assets/branding/nexora_logo_transparent.png ]; then
            curl -fL "https://chatgpt.com/backend-api/estuary/public_" \
              -o app/src/main/assets/branding/nexora_logo_transparent.png
          fi

          if [ ! -s app/src/main/assets/branding_v2/nexora_icon.png ] || [ "$(wc -c < app/src/main/assets/branding_v2/nexora_icon.png)" -lt 4096 ]; then
            curl -fL --retry 3 --retry-delay 2 "https://raw.githubusercontent.com/bjalalsjzbslalqoqueeyhskaambpqo/hev/refs/heads/main/61d61403-98b2-48b6-8603-8d633affa3de.png" \
              -o app/src/main/assets/branding_v2/nexora_icon.png
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Gradle wrapper
        run: |
          cd app/..
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew


      - name: Prepare signing credentials
        id: signing
        env:
          RAW_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RAW_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          STORE_PASSWORD="${RAW_STORE_PASSWORD:-}"
          KEY_PASSWORD="${RAW_KEY_PASSWORD:-}"

          if [ ${#STORE_PASSWORD} -lt 6 ]; then
            STORE_PASSWORD="xtunnel_store_2026"
            echo "ANDROID_KEYSTORE_PASSWORD is missing/short; using CI fallback password." >&2
          fi

          if [ ${#KEY_PASSWORD} -lt 6 ]; then
            KEY_PASSWORD="$STORE_PASSWORD"
            echo "ANDROID_KEY_PASSWORD is missing/short; using store password as key password." >&2
          fi

          echo "store_password=$STORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "key_password=$KEY_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Restore release keystore cache
        id: release_keystore_cache
        uses: actions/cache@v4
        with:
          path: .ci/release-keystore.jks
          key: xtunnel-release-keystore-v1

      - name: Generate release keystore (first run only)
        if: steps.release_keystore_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore .ci/release-keystore.jks \
            -alias xtunnel-release \
            -keyalg RSA \
            -keysize 4096 \
            -validity 3650 \
            -storepass "${{ steps.signing.outputs.store_password }}" \
            -keypass "${{ steps.signing.outputs.key_password }}" \
            -dname "CN=XTunnel,OU=Mobile,O=XTunnel,L=Internet,ST=Global,C=US"

      - name: Build minimized release artifacts (AAB + APK)
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.ci/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ steps.signing.outputs.store_password }}
          ANDROID_KEY_ALIAS: xtunnel-release
          ANDROID_KEY_PASSWORD: ${{ steps.signing.outputs.key_password }}
        run: >
          ./gradlew
          --stacktrace
          clean
          :app:bundleRelease
          assembleRelease
          -Pandroid.enableR8.fullMode=true
          -Pandroid.experimental.enableNewResourceShrinker=true
          -Pandroid.nonTransitiveRClass=true
          -Pandroid.nonFinalResIds=true
          -x lint
          -x test

      - name: Generate artifact size report
        run: |
          APK_PATH="$(ls -1 app/build/outputs/apk/release/*.apk | head -n 1)"
          AAB_PATH="$(ls -1 app/build/outputs/bundle/release/*.aab | head -n 1)"
          APK_SIZE="$(du -h "$APK_PATH" | cut -f1)"
          AAB_SIZE="$(du -h "$AAB_PATH" | cut -f1)"
          {
            echo "### Release artifact size"
            echo ""
            echo "- APK: \`$APK_SIZE\` (`$APK_PATH`)"
            echo "- AAB: \`$AAB_SIZE\` (`$AAB_PATH`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload R8 mapping (obfuscation)
        uses: actions/upload-artifact@v4
        with:
          name: r8-mapping
          path: app/build/outputs/mapping/release/mapping.txt

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab-release
          path: app/build/outputs/bundle/release/*.aab

      - id: upload_apk_primary
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/*.apk

      - name: Retry upload artifact
        if: steps.upload_apk_primary.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/*.apk
