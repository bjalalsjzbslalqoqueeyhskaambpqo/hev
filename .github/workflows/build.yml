name: Build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk
          key: android-sdk-${{ runner.os }}
          restore-keys: android-sdk-

      - uses: android-actions/setup-android@v3

      - name: Download HEV
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L "https://github.com/bjalalsjzbslalqoqueeyhskaambpqo/hev/raw/libs/jniLibs/arm64-v8a/libhev-socks5-tunnel.so" \
            -o app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so

      - name: Download Xray
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L "https://github.com/bjalalsjzbslalqoqueeyhskaambpqo/hev/blob/release-arm64/libxray.so?raw=1" \
            -o app/src/main/jniLibs/arm64-v8a/libxray.so

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Setup Gradle wrapper
        run: |
          cd app/..
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Restore release keystore cache
        id: release_keystore_cache
        uses: actions/cache@v4
        with:
          path: .ci/release-keystore.jks
          key: xtunnel-release-keystore-v1

      - name: Generate release keystore (first run only)
        if: steps.release_keystore_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore .ci/release-keystore.jks \
            -alias xtunnel-release \
            -keyalg RSA \
            -keysize 4096 \
            -validity 3650 \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            -dname "CN=XTunnel,OU=Mobile,O=XTunnel,L=Internet,ST=Global,C=US"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.ci/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: xtunnel-release
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - id: upload_apk_primary
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/*.apk

      - name: Retry upload artifact
        if: steps.upload_apk_primary.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/*.apk
