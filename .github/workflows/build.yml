name: Build Simple Mode

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v4

      - name: Download HEV
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          if [ ! -f app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so ]; then
            curl -L "https://github.com/bjalalsjzbslalqoqueeyhskaambpqo/hev/raw/libs/jniLibs/arm64-v8a/libhev-socks5-tunnel.so" \
              -o app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so
          fi

      - name: Restore Gradle wrapper jar
        run: base64 -d gradle/wrapper/gradle-wrapper.ja > gradle/wrapper/gradle-wrapper.jar

      - name: Restore Java source extensions
        run: |
          mv app/src/main/java/com/blacktunnel/BtVpnService.jav app/src/main/java/com/blacktunnel/BtVpnService.java
          mv app/src/main/java/com/blacktunnel/SimpleModeActivity.jav app/src/main/java/com/blacktunnel/SimpleModeActivity.java

      - name: Build debug APK (simple mode)
        run: ./gradlew --no-daemon :app:assembleDebug -x lint -x test

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-simple-mode
          path: app/build/outputs/apk/debug/*.apk
