name: Build Release

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.7

      - name: Download HEV
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          if [ ! -f app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so ]; then
            curl -L "https://github.com/bjalalsjzbslalqoqueeyhskaambpqo/hev/raw/libs/jniLibs/arm64-v8a/libhev-socks5-tunnel.so" \
              -o app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so
          fi

      - name: Restore Java source extensions
        run: ./scripts/prepare_ci_sources.sh

      - name: Prepare release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ]; then
            echo "ANDROID_KEYSTORE_BASE64 not set: generating test keystore."
            keytool -genkeypair \
              -keystore "$RUNNER_TEMP/release.keystore" \
              -storepass android \
              -alias testkey \
              -keypass android \
              -dname "CN=BlackTunnel Test, OU=CI, O=BlackTunnel, L=N/A, S=N/A, C=US" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "ANDROID_KEYSTORE_PASSWORD=android" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_ALIAS=testkey" >> "$GITHUB_ENV"
            echo "ANDROID_KEY_PASSWORD=android" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
          echo "ANDROID_KEYSTORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> "$GITHUB_ENV"
          echo "ANDROID_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}" >> "$GITHUB_ENV"

      - name: Build release APK (minified)
        run: gradle --no-daemon :app:assembleRelease -x lint -x test

      - name: Upload release APK
        uses: actions/upload-artifact@v6
        with:
          name: apk-release
          path: app/build/outputs/apk/release/*.apk
