name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk
          key: android-sdk-${{ runner.os }}
          restore-keys: android-sdk-
      - uses: android-actions/setup-android@v3
      - name: Download HEV
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L "https://github.com/bjalalsjzbslalqoqueeyhskaambpqo/hev/raw/libs/jniLibs/arm64-v8a/libhev-socks5-tunnel.so" \
            -o app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so
      - name: Download gost
        run: |
          curl -L "https://github.com/go-gost/gost/releases/download/v3.2.6/gost_3.2.6_android_arm64.tar.gz" \
            -o gost.tar.gz
          tar -xzf gost.tar.gz
          mkdir -p app/src/main/assets
          cp gost app/src/main/assets/gost
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
      - name: Setup Gradle wrapper
        run: |
          cd app/..
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
      - name: Build APK
        run: ./gradlew assembleDebug
      - id: upload_apk_primary
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/*.apk
      - name: Retry upload artifact
        if: steps.upload_apk_primary.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: app/build/outputs/apk/debug/*.apk
