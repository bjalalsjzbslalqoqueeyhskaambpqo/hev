name: Build Simple Mode

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Download HEV
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L "https://github.com/bjalalsjzbslalqoqueeyhskaambpqo/hev/raw/libs/jniLibs/arm64-v8a/libhev-socks5-tunnel.so" \
            -o app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so

      - name: Setup Gradle wrapper
        run: |
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew

      - name: Build debug APK (simple mode)
        run: ./gradlew --stacktrace clean :app:assembleDebug -x lint -x test

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug-simple-mode
          path: app/build/outputs/apk/debug/*.apk
