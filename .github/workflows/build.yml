name: Build

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk
          key: android-sdk-${{ runner.os }}
          restore-keys: android-sdk-

      - uses: android-actions/setup-android@v3

      - name: Download HEV
        run: |
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -L "https://github.com/bjalalsjzbslalqoqueeyhskaambpqo/hev/raw/libs/jniLibs/arm64-v8a/libhev-socks5-tunnel.so" \
            -o app/src/main/jniLibs/arm64-v8a/libhev-socks5-tunnel.so

      - name: Download Xray
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p app/src/main/jniLibs/arm64-v8a
          curl -fL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${{ github.repository }}/contents/libxray.so?ref=release-arm64" \
            -o app/src/main/jniLibs/arm64-v8a/libxray.so
          XRAY_SIZE=$(wc -c < app/src/main/jniLibs/arm64-v8a/libxray.so)
          if [ "$XRAY_SIZE" -lt 2000000 ]; then
            echo "Downloaded libxray.so is unexpectedly small: ${XRAY_SIZE} bytes" >&2
            exit 1
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Setup Gradle wrapper
        run: |
          cd app/..
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew


      - name: Prepare signing credentials
        id: signing
        env:
          RAW_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          RAW_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          STORE_PASSWORD="${RAW_STORE_PASSWORD:-}"
          KEY_PASSWORD="${RAW_KEY_PASSWORD:-}"

          if [ ${#STORE_PASSWORD} -lt 6 ]; then
            STORE_PASSWORD="xtunnel_store_2026"
            echo "ANDROID_KEYSTORE_PASSWORD is missing/short; using CI fallback password." >&2
          fi

          if [ ${#KEY_PASSWORD} -lt 6 ]; then
            KEY_PASSWORD="$STORE_PASSWORD"
            echo "ANDROID_KEY_PASSWORD is missing/short; using store password as key password." >&2
          fi

          echo "store_password=$STORE_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "key_password=$KEY_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Restore release keystore cache
        id: release_keystore_cache
        uses: actions/cache@v4
        with:
          path: .ci/release-keystore.jks
          key: xtunnel-release-keystore-v1

      - name: Generate release keystore (first run only)
        if: steps.release_keystore_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci
          keytool -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore .ci/release-keystore.jks \
            -alias xtunnel-release \
            -keyalg RSA \
            -keysize 4096 \
            -validity 3650 \
            -storepass "${{ steps.signing.outputs.store_password }}" \
            -keypass "${{ steps.signing.outputs.key_password }}" \
            -dname "CN=XTunnel,OU=Mobile,O=XTunnel,L=Internet,ST=Global,C=US"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/.ci/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ steps.signing.outputs.store_password }}
          ANDROID_KEY_ALIAS: xtunnel-release
          ANDROID_KEY_PASSWORD: ${{ steps.signing.outputs.key_password }}
        run: ./gradlew assembleRelease

      - name: Upload R8 mapping (obfuscation)
        uses: actions/upload-artifact@v4
        with:
          name: r8-mapping
          path: app/build/outputs/mapping/release/mapping.txt

      - id: upload_apk_primary
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/*.apk

      - name: Retry upload artifact
        if: steps.upload_apk_primary.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: apk-release
          path: app/build/outputs/apk/release/*.apk
